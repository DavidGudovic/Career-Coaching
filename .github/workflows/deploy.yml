name: Deploy to production

# Builds the production image on GitHub's runners, pushes it to GHCR, then SSHes
# into the server and restarts the stack against the freshly pulled image.
# The server never builds — it only pulls changed layers — so deploys are ~sub-minute.

on:
  push:
    branches: [main]
  workflow_dispatch: {} # lets you trigger a manual redeploy from the Actions tab

# Never run two deploys at once; let an in-flight one finish before the next starts.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/davidgudovic/career-coaching

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push to GHCR
    outputs:
      image-sha: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_SERVER_URL=${{ vars.NEXT_PUBLIC_SERVER_URL || 'https://jelena.dgudovic.dev' }}
          # Persist build cache between CI runs so pnpm install + next build stay incremental.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT }}
          script_stop: true
          # GHCR_PAT is only needed if the package is PRIVATE. If the package is
          # public, leave the secret unset and the login is skipped.
          envs: GHCR_PAT
          script: |
            set -euo pipefail
            cd /var/www/html/Career-Coaching
            git fetch origin main
            git reset --hard origin/main
            if [ -n "${GHCR_PAT:-}" ]; then
              echo "$GHCR_PAT" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            fi
            ./scripts/deploy.sh
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
